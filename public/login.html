<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI - Login (Ghana)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css?v=2">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .login-box {
            width: 400px;
            padding: 3rem;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-family: 'Outfit';
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .demo-creds {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="glass login-box">
            <div class="logo" style="justify-content:center; margin-bottom: 1rem;">
                <i class="fa-solid fa-notes-medical"></i>
                <h2>MedAI GH</h2>
            </div>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Ghana's Intelligent Pharmacy System</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <div id="login-error" style="color:var(--danger); margin-bottom:1rem; display:none;">Invalid Credentials
                </div>
                <button type="submit" class="btn">Login Securely</button>
            </form>


        </div>
    </div>

    <script src="/js/app.js?v=4"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('medai_role', data.role);
                    localStorage.setItem('medai_username', data.username);
                    localStorage.setItem('medai_profile_pic', data.profile_pic);

                    if (data.role === 'pharmacist') {
                        window.location.href = '/pharmacist.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>

</html>
