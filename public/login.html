<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI - Login (Ghana)</title>
    <!-- PWA Meta Elements -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <!-- Offline Mode: Google Fonts Disabled -->
    <link rel="stylesheet" href="/vendor/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css?v=2">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .login-box {
            width: 400px;
            padding: 3rem;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-family: 'Outfit';
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .demo-creds {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="glass login-box">
            <div class="logo" style="justify-content:center; margin-bottom: 1rem;">
                <i class="fa-solid fa-notes-medical"></i>
                <h2>MedAI GH</h2>
            </div>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Ghana's Intelligent Pharmacy System</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <div id="login-error" style="color:var(--danger); margin-bottom:1rem; display:none;">Invalid Credentials
                </div>
                <button type="submit" class="btn">Login Securely</button>
            </form>
            <div style="margin-top: 1.5rem; font-size: 0.95rem;">
                <span style="color: var(--text-muted);">New patient?</span> 
                <a href="#" onclick="openRegisterModal(event)" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 5px;">Create Patient Account</a>
            </div>
        </div>
    </div>

    <!-- Patient Registration Modal -->
    <div id="register-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2><i class="fa-solid fa-user-plus" style="color:var(--primary);"></i> Patient Registration</h2>
                <button style="background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="closeRegisterModal()">&times;</button>
            </div>
            <form id="register-form" onsubmit="submitRegistration(event)">
                <div class="modal-body">
                    <label>Full Name</label>
                    <input type="text" id="reg-fullname" placeholder="Enter your full name" required>

                    <label>Desired Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username" required>

                    <label>Password (Min 6 characters)</label>
                    <input type="password" id="reg-password" placeholder="Choose a password" required>

                    <div id="register-error" style="color:var(--danger); margin-bottom:1rem; display:none;">Error goes here</div>
                    <div id="register-success" style="color:var(--success); margin-bottom:1rem; display:none;">Registration successful! Redirecting...</div>
                </div>
                <div style="display:flex; gap:10px; justify-content:flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeRegisterModal()" style="width:auto; padding: 10px 20px;">Cancel</button>
                    <button type="submit" class="btn" style="width:auto; padding: 10px 20px;">Register Account</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js?v=5"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('medai_role', data.role);
                    localStorage.setItem('medai_username', data.username);
                    localStorage.setItem('medai_profile_pic', data.profile_pic);

                    if (data.role === 'pharmacist') {
                        window.location.href = '/pharmacist.html';
                    } else if (data.role === 'user') {
                        window.location.href = '/user-portal.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        });

        // Registration Modal Handlers
        function openRegisterModal(e) {
            if (e) e.preventDefault();
            document.getElementById('register-modal').style.display = 'flex';
        }

        function closeRegisterModal() {
            document.getElementById('register-modal').style.display = 'none';
            document.getElementById('reg-fullname').value = '';
            document.getElementById('reg-username').value = '';
            document.getElementById('reg-password').value = '';
            document.getElementById('register-error').style.display = 'none';
            document.getElementById('register-success').style.display = 'none';
        }

        async function submitRegistration(e) {
            e.preventDefault();
            const fullname = document.getElementById('reg-fullname').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            
            const errDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');
            
            errDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const res = await fetch('/api/register/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, full_name: fullname })
                });
                
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || 'Registration failed.');
                }
                
                successDiv.style.display = 'block';
                setTimeout(() => {
                    closeRegisterModal();
                    document.getElementById('username').value = username;
                    document.getElementById('password').value = password;
                }, 1500);

            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
            }
        }

        // Service Worker registration for PWA mobile installation support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered.'))
                    .catch(err => console.log('Service worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
