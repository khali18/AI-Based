<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI - Login (Ghana)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css?v=2">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .login-box {
            width: 400px;
            padding: 3rem;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-family: 'Outfit';
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .demo-creds {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="glass login-box">
            <div class="logo" style="justify-content:center; margin-bottom: 1rem;">
                <i class="fa-solid fa-notes-medical"></i>
                <h2>MedAI GH</h2>
            </div>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Ghana's Intelligent Pharmacy System</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <div id="login-error" style="color:var(--danger); margin-bottom:1rem; display:none;">Invalid Credentials</div>
                <button type="submit" class="btn">Login Securely</button>
                <p style="margin-top:1.5rem; font-size:0.85rem;">Don't have an account? <a href="#" onclick="toggleAuth(true)" style="color:var(--primary); text-decoration:none; font-weight:600;">Create New Account</a></p>
            </form>

            <form id="register-form" style="display:none;">
                <div class="form-group">
                    <label>Choose Username</label>
                    <input type="text" id="reg-username" placeholder="e.g. sheripha2" required>
                </div>
                <div class="form-group">
                    <label>Choose Password</label>
                    <input type="password" id="reg-password" placeholder="Min 6 characters" required>
                </div>
                <div class="form-group">
                    <label>Account Role</label>
                    <select id="reg-role" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--card-border); font-family:inherit;">
                        <option value="pharmacist">Pharmacist (Staff)</option>
                        <option value="admin">System Administrator</option>
                    </select>
                </div>
                <div id="reg-error" style="color:var(--danger); margin-bottom:1rem; display:none;">Registration Failed</div>
                <button type="submit" class="btn" style="background:var(--success);">Create & Login</button>
                <p style="margin-top:1.5rem; font-size:0.85rem;">Already have an account? <a href="#" onclick="toggleAuth(false)" style="color:var(--primary); text-decoration:none; font-weight:600;">Back to Login</a></p>
            </form>
        </div>
    </div>

    <script>
        function toggleAuth(showReg) {
            document.getElementById('login-form').style.display = showReg ? 'none' : 'block';
            document.getElementById('register-form').style.display = showReg ? 'block' : 'none';
        }

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('medai_role', data.role);
                    localStorage.setItem('medai_username', data.username);
                    window.location.href = data.role === 'pharmacist' ? '/pharmacist.html' : '/index.html';
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (err) { console.error(err); }
        });

        // Register Logic
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('reg-username').value;
            const p = document.getElementById('reg-password').value;
            const r = document.getElementById('reg-role').value;
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, role: r })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('medai_role', data.role);
                    localStorage.setItem('medai_username', data.username);
                    window.location.href = data.role === 'pharmacist' ? '/pharmacist.html' : '/index.html';
                } else {
                    document.getElementById('reg-error').innerText = data.message || "Registration Failed";
                    document.getElementById('reg-error').style.display = 'block';
                }
            } catch (err) { console.error(err); }
        });
    </script>
</body>

</html>
